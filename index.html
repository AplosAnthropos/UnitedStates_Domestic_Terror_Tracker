<!DOCTYPE html>
<html>
<head>
  <title>OSINT Event Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    #map { height: 100vh; margin: 0; padding: 0; }
    body { margin: 0; }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// =========================
// INIT MAP
// =========================
var map = L.map('map').setView([39.5, -98.35], 4); // US-centered default

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// =========================
// LOAD EVENTS
// =========================
fetch('events.geojson')
  .then(res => res.json())
  .then(data => {

    L.geoJSON(data, {

      pointToLayer: function (feature, latlng) {

        let color = "blue";

        if (feature.properties?.event_type === "attack") color = "red";
        if (feature.properties?.event_type === "rally") color = "orange";

        return L.circleMarker(latlng, {
          radius: 6,
          fillColor: color,
          color: "#000",
          weight: 1,
          fillOpacity: 0.8
        });
      },

      onEachFeature: function (feature, layer) {
        layer.bindPopup(
          "<b>" + (feature.properties?.event_title || "Event") + "</b><br>" +
          (feature.properties?.summary || "")
        );
      }

    }).addTo(map);

  })
  .catch(err => console.log("ERROR loading events.geojson:", err));

</script>

</body>
</html>
