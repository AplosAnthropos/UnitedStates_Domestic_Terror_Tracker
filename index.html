<!DOCTYPE html>
<html>
<head>
  <title>US Domestic Terror Tracker</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// INIT MAP
var map = L.map('map').setView([39.5, -98.35], 4);

// BASE MAP
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// LOAD EVENTS
fetch('events.geojson')
  .then(res => res.json())
  .then(data => {

    L.geoJSON(data, {

      pointToLayer: function (feature, latlng) {

        let color = "blue";

        if (feature.properties?.event_type === "attack") color = "red";
        if (feature.properties?.event_type === "rally") color = "orange";

        return L.circleMarker(latlng, {
          radius: 7,
          fillColor: color,
          color: "#000",
          weight: 1,
          fillOpacity: 0.8
        });
      },

      onEachFeature: function (feature, layer) {

        layer.bindPopup(
          "<b>" + (feature.properties?.event_title || "Event") + "</b><br>" +
          "<b>Type:</b> " + (feature.properties?.event_type || "N/A") + "<br>" +
          "<b>Date:</b> " + (feature.properties?.date_of_incident || "N/A") + "<br>" +
          "<b>Killed:</b> " + (feature.properties?.killed ?? 0) + "<br>" +
          "<b>Wounded:</b> " + (feature.properties?.wounded ?? 0) + "<br>" +
          "<b>Total:</b> " + (feature.properties?.casualties_total ?? 0) + "<br>" +
          "<b>Summary:</b> " + (feature.properties?.summary || "") + "<br>" +
          "<a href='" + (feature.properties?.source || "#") + "' target='_blank'>Source</a>"
        );

      }

    }).addTo(map);

  })
  .catch(err => console.log("Error loading GeoJSON:", err));

</script>

</body>
</html>
