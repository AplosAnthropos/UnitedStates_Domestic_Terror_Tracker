<!DOCTYPE html>
<html>
<head>
  <title>OSINT Event Ingest Tool</title>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial; max-width: 900px; margin: 20px auto; }
    textarea { width: 100%; height: 180px; }
    input { width: 100%; margin: 5px 0; padding: 6px; }
    pre { background: #f4f4f4; padding: 10px; white-space: pre-wrap; }
    button { padding: 10px; margin-top: 10px; }
  </style>
</head>

<body>

<h2>OSINT Event Builder (Verified Entry Tool)</h2>

<p>Paste article or report:</p>
<textarea id="text"></textarea>

<p>Coordinates (manual for now):</p>
<input id="lon" placeholder="Longitude">
<input id="lat" placeholder="Latitude">

<p>Event Type:</p>
<select id="type">
  <option value="attack">attack</option>
  <option value="rally">rally</option>
</select>

<p>Title:</p>
<input id="title">

<p>Summary:</p>
<input id="summary">

<button onclick="build()">Generate GeoJSON Event</button>

<h3>Output:</h3>
<pre id="out"></pre>

<script>
function build() {

  const event = {
    type: "Feature",
    geometry: {
      type: "Point",
      coordinates: [
        parseFloat(document.getElementById("lon").value),
        parseFloat(document.getElementById("lat").value)
      ]
    },
    properties: {
      event_title: document.getElementById("title").value,
      event_type: document.getElementById("type").value,
      summary: document.getElementById("summary").value,
      raw_text: document.getElementById("text").value,
      date: new Date().toISOString().split("T")[0]
    }
  };

  document.getElementById("out").textContent =
    JSON.stringify(event, null, 2);
}
</script>

</body>
</html>
