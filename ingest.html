<!DOCTYPE html>
<html>
<head>
  <title>OSINT Event Ingest Tool</title>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial; padding: 20px; max-width: 900px; }
    textarea { width: 100%; height: 200px; }
    pre { background: #f4f4f4; padding: 10px; }
    button { padding: 10px; margin-top: 10px; }
  </style>
</head>

<body>

<h2>News → GeoJSON Converter (Manual Verified Mode)</h2>

<p>Paste article text below:</p>

<textarea id="input"></textarea>

<br>
<button onclick="convert()">Convert to GeoJSON Template</button>

<h3>Output:</h3>
<pre id="output"></pre>

<script>
function convert() {

  let text = document.getElementById("input").value;

  // This is a TEMPLATE generator (NOT fake intelligence)
  // You will manually verify and fill details.

  let result = {
    type: "Feature",
    geometry: {
      type: "Point",
      coordinates: ["LONGITUDE_HERE", "LATITUDE_HERE"]
    },
    properties: {
      event_title: "FILL_FROM_ARTICLE",
      event_type: "attack_or_rally",
      date: "YYYY-MM-DD",
      city: "FILL",
      state: "FILL",
      casualties_killed: 0,
      casualties_wounded: 0,
      casualties_total: 0,
      actor_type: "lone_actor_or_group",
      group_affiliation: "FILL_IF_KNOWN",
      summary: text,
      sources: []
    }
  };

  document.getElementById("output").textContent =
    JSON.stringify(result, null, 2);
}
</script>

</body>
</html>
