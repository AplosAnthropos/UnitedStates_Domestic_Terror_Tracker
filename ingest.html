<!DOCTYPE html>
<html>
<head>
  <title>Event Ingest Tool</title>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial; max-width: 800px; margin: 20px auto; }
    textarea, input, select { width: 100%; margin: 5px 0; padding: 6px; }
    pre { background: #f4f4f4; padding: 10px; }
    button { padding: 10px; margin-top: 10px; }
  </style>
</head>

<body>

<h2>Add Event</h2>

<textarea id="summary" placeholder="Summary / description"></textarea>

<input id="title" placeholder="Event title">

<select id="type">
  <option value="attack">Attack</option>
  <option value="rally">Rally</option>
</select>

<input id="date" placeholder="YYYY-MM-DD">
<input id="lon" placeholder="Longitude">
<input id="lat" placeholder="Latitude">

<input id="killed" type="number" placeholder="Killed">
<input id="wounded" type="number" placeholder="Wounded">

<input id="source" placeholder="Source URL">

<button onclick="build()">Generate GeoJSON</button>

<pre id="output"></pre>

<script>
function build() {

  const killed = parseInt(document.getElementById("killed").value) || 0;
  const wounded = parseInt(document.getElementById("wounded").value) || 0;

  const event = {
    type: "Feature",
    geometry: {
      type: "Point",
      coordinates: [
        parseFloat(document.getElementById("lon").value),
        parseFloat(document.getElementById("lat").value)
      ]
    },
    properties: {
      event_title: document.getElementById("title").value,
      event_type: document.getElementById("type").value,
      date_of_incident: document.getElementById("date").value,
      killed: killed,
      wounded: wounded,
      casualties_total: killed + wounded,
      summary: document.getElementById("summary").value,
      source: document.getElementById("source").value
    }
  };

  document.getElementById("output").textContent =
    JSON.stringify(event, null, 2);
}
</script>

</body>
</html>
