<!DOCTYPE html>
<html>
<head>
  <title>Event Ingest Tool</title>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial; max-width: 900px; margin: 20px auto; }
    textarea { width: 100%; height: 220px; }
    pre { background: #f4f4f4; padding: 12px; white-space: pre-wrap; }
    button { padding: 10px; margin-top: 10px; cursor: pointer; }
  </style>
</head>
<body>

<h2>News → Structured Event Converter (Manual Verified OSINT)</h2>

<p>Paste a news article or report below:</p>

<textarea id="input"></textarea>

<button onclick="convert()">Generate Event Template</button>

<h3>Output JSON:</h3>
<pre id="output"></pre>

<script>
function convert() {

  const text = document.getElementById("input").value;

  const event = {
    type: "Feature",
    geometry: {
      type: "Point",
      coordinates: ["LONGITUDE", "LATITUDE"]
    },
    properties: {
      event_title: "FILL_REQUIRED",
      event_type: "attack | rally",
      date: "YYYY-MM-DD",
      city: "FILL_REQUIRED",
      state: "FILL_REQUIRED",
      casualties_killed: 0,
      casualties_wounded: 0,
      casualties_total: 0,
      actor_type: "lone_actor | group",
      group_affiliation: "unknown or fill",
      summary: text,
      sources: [
        {
          name: "ADD_SOURCE_NAME",
          url: "ADD_SOURCE_URL"
        }
      ],
      verification_status: "unverified_manual_entry"
    }
  };

  document.getElementById("output").textContent =
    JSON.stringify(event, null, 2);
}
</script>

</body>
</html>
